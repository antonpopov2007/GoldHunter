name: GoldHunter Daily Run

on:
  schedule:
    # Запуск каждый день в 06:00 UTC (09:00 MSK)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Кнопка для запуска вручную через веб-интерфейс GitHub

jobs:
  run-parsers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GoldHunter
        env:
          # Передаем строку подключения из секретов репозитория
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Устанавливаем PYTHONPATH чтобы внутренние импорты работали корректно
          export PYTHONPATH=$(pwd)
          python scheduler/daily_run.py
